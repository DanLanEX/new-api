# New-API Docker Compose Configuration
#
# GPT注：这是个人/轻量自用版本，只启动 new-api 一个容器。
# GPT注：不配置 SQL_DSN 时，New API 会使用 SQLite。
# GPT注：不配置 REDIS_CONN_STRING 时，New API 会关闭 Redis。
# GPT注：PostgreSQL、MySQL、Redis 都不是当前轻量部署必需项，所以已在下方注释。
# GPT注：新版 Docker Compose 已不需要 version 字段，保留会出现 obsolete warning，所以已删除。
# GPT注：当前 fork 改了源码和前端，所以这里使用本地 build；否则会继续运行官方镜像，看不到自定义改动。
# GPT注：已禁用 wget healthcheck，避免运行镜像为了健康检查额外安装 wget。
#
# Quick Start:
#   1. mkdir -p data logs
#   2. 修改 SESSION_SECRET 为固定随机字符串
#   3. docker compose up -d --build
#   4. 使用反向代理访问 127.0.0.1:3000

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: danlan-new-api:local

    # GPT注：以后如果想完全回到官方镜像，可以删掉 build，并改回官方 image。
#    image: calciumion/new-api:latest

    container_name: new-api
    restart: always
    command: --log-dir /app/logs

    # GPT注：只监听本机，避免 3000 端口直接暴露公网；外部访问交给 Caddy / Nginx / Cloudflare Tunnel。
    ports:
      - "127.0.0.1:3000:3000"

    # GPT注：SQLite 数据和应用数据放在 ./data，日志放在 ./logs；备份这两个目录即可。
    volumes:
      - ./data:/data
      - ./logs:/app/logs

    environment:
      - TZ=Asia/Shanghai
      - SQLITE_PATH=/data/new-api.db
      - SESSION_SECRET=CHANGE_THIS_TO_A_FIXED_RANDOM_STRING
      - ERROR_LOG_ENABLED=true

#      - BATCH_UPDATE_ENABLED=true
#      - NODE_NAME=new-api-node-1
#      - MEMORY_CACHE_ENABLED=true
#      - SYNC_FREQUENCY=60
#      - STREAMING_TIMEOUT=300
#      - RELAY_IDLE_CONN_TIMEOUT=90
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js

    # GPT注：healthcheck 原本依赖 wget；本地自定义构建先关闭，服务状态用 docker compose logs / curl 宿主机端口检查即可。
#    healthcheck:
#      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
#      interval: 30s
#      timeout: 10s
#      retries: 3

# -----------------------------------------------------------------------------
